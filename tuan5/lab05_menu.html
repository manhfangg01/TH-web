<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .menu1 {
        width: 500px;
        height: 30px;
      }

      .horizontal-menu {
        width: 100%;
        height: 100%;
      }
      a {
        text-decoration: none;
      }
      ul {
        list-style: none;
      }

      .horizontal-menu li {
        width: 19%;
        display: inline-block;
        background-color: chartreuse;
        text-align: center;
      }

      .horizontal-menu li a {
        line-height: 30px;
        color: blue;
      }

      .horizontal-menu li:hover {
        background-color: #d7be1c;
        color: white;
        border-radius: 10px;
        transition: 1s;
      }

      .menu2 {
        width: 200px;
        height: 500px;
      }

      .vertical-menu {
        width: 100%;
        height: 100%;
      }

      .vertical-menu li {
        padding: 10px;
        background-color: #205797;
        margin-top: 2px;
      }

      .vertical-menu li a {
        color: black;
      }

      .vertical-menu li:hover {
        background-color: #648cb9;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="menu1">
      <ul class="horizontal-menu">
        <li>
          <a href="#">Trang chủ</a>
        </li>
        <li>
          <a href="#">Giới thiệu</a>
        </li>
        <li>
          <a href="#">Sản phẩm</a>
        </li>
        <li>
          <a href="#">Dịch vụ</a>
        </li>
        <li>
          <a href="#">Liên hệ</a>
        </li>
      </ul>
    </div>

    <div class="menu2">
      <ul class="vertical-menu">
        <li>
          <a href="#">Trang chủ</a>
        </li>
        <li>
          <a href="#">Giới thiệu</a>
        </li>
        <li>
          <a href="#">Sản phẩm</a>
        </li>
        <li>
          <a href="#">Dịch vụ</a>
        </li>
        <li>
          <a href="#">Liên hệ</a>
        </li>
      </ul>
    </div>
  </body>
</html>
