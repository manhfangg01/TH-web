<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #container {
        width: 1200px;
        margin: 0 auto;
      }

      #header {
        height: 100px;
        width: 100%;
      }

      #topbar {
        width: 100%;
        height: 30%;
        background-color: #988888;
      }

      #bottombar {
        height: 70%;
        background-color: antiquewhite;
      }

      #main {
        height: 700px;
        margin-top: 30px;
      }

      #category {
        height: 100%;
        width: 20%;
        background-color: aquamarine;
        float: left;
      }

      #content {
        height: 100%;
        width: 75%;
        float: right;
      }

      #search-contact-wrapper {
        width: 100%;
        height: 10%;
        background-color: #bb3b3b;
      }

      #banner {
        height: 90%;
        background-color: #29297d;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div id="header">
        <div id="topbar"></div>
        <div id="bottombar">
          <div id="logo"></div>
          <div id="nav"></div>
          <div id="cart"></div>
        </div>
      </div>
      <div id="main">
        <div id="category"></div>
        <div id="content">
          <div id="search-contact-wrapper">
            <div id="search"></div>
            <div id="contact"></div>
          </div>
          <div id="banner"></div>
        </div>
      </div>
    </div>
  </body>
</html>
