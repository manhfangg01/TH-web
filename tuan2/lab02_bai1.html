<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Layout</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        padding: 20px;
        background-color: #f0f0f0;
      }

      .container {
        width: 1000px;
        border: 2px solid #555;
        background-color: white;
      }

      /* Header: Logo và Banner */
      header {
        display: flex;
        height: 150px;
        border-bottom: 2px solid #555;
      }

      .logo {
        flex: 1;
        background-color: #ffb3b3; /* Màu đỏ nhạt */
        display: flex;
        align-items: center;
        justify-content: center;
        border-right: 2px solid #555;
        font-weight: bold;
      }

      .banner {
        flex: 2;
        background-color: #ccffff; /* Màu xanh nhạt */
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
      }

      /* Menu ngang (1-5) */
      nav {
        display: flex;
        border-bottom: 2px solid #555;
      }

      .nav-item {
        flex: 1;
        padding: 15px;
        text-align: center;
        border-right: 2px solid #ccc;
        font-weight: bold;
      }

      .nav-item:last-child {
        border-right: none;
      }

      /* Main Content Area */
      main {
        display: flex;
        min-height: 400px;
        border-bottom: 2px solid #555;
      }

      /* Sidebar trái và phải */
      aside {
        width: 200px;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 5px;
        background-color: #fff;
      }

      .sidebar-left {
        border-right: 2px solid #555;
      }

      .sidebar-right {
        border-left: 2px solid #555;
      }

      .sidebar-item {
        background-color: #b3e6d8; /* Màu xanh lá nhạt */
        padding: 15px;
        text-align: center;
        border: 1px solid #999;
        font-weight: bold;
      }

      /* Content chính giữa */
      .content {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 1.2em;
      }

      /* Footer */
      footer {
        padding: 20px;
        text-align: center;
        font-weight: bold;
        background-color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo">Logo</div>
        <div class="banner">Banner</div>
      </header>

      <nav>
        <div class="nav-item">1</div>
        <div class="nav-item">2</div>
        <div class="nav-item">3</div>
        <div class="nav-item">4</div>
        <div class="nav-item">5</div>
      </nav>

      <main>
        <aside class="sidebar-left">
          <div class="sidebar-item">1</div>
          <div class="sidebar-item">2</div>
          <div class="sidebar-item">3</div>
          <div class="sidebar-item">4</div>
          <div class="sidebar-item">5</div>
        </aside>

        <section class="content">Content</section>

        <aside class="sidebar-right">
          <div class="sidebar-item">1</div>
          <div class="sidebar-item">2</div>
          <div class="sidebar-item">3</div>
          <div class="sidebar-item">4</div>
          <div class="sidebar-item">5</div>
        </aside>
      </main>

      <footer>Footer</footer>
    </div>
  </body>
</html>
