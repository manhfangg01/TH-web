<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Sản phẩm Khuyến mãi</title>
    <style>
      body {
        font-family: "Rubik", sans-serif;
        margin: 10px;
      }
      /* Giữ lại CSS cho khung khuyến mãi */
      .title {
        line-height: 30px;
        text-align: center;
        color: #fff;
        font-weight: bold;
        background-color: #504b4b;
        border-radius: 10px 10px 0 0;
        width: 100%; /* Độ rộng khớp với menu left cũ */
      }
      .box_content {
        text-align: center;
        border: 3px solid #504b4b;
        padding: 2px;
      }
      .pro_title {
        text-align: center;
        font-weight: bold;
        color: #f00;
        font-size: 14px;
        padding: 5px;
      }
      .pro_price {
        text-align: center;
        color: #f00;
        font-weight: bold;
        width: 50%;
        float: left;
        font-size: 14px;
      }
      .oldprice {
        text-align: center;
        color: #847676;
        text-decoration: line-through;
        width: 50%;
        float: right;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="box" style="width: 200px">
      <div class="title">SP Khuyến mãi</div>
      <div class="box_content" style="height: 190px">
        <marquee direction="up" height="190" scrollamount="3" onmouseover="this.stop()" onmouseout="this.start()">
          <div class="pro_title">Điều Kỳ Diệu Của Tiệm Tạp Hóa Namiya (Tái Bản 2018)</div>
          <div style="text-align: center"><img src="images/Sach_2.jpg" height="120" /></div>
          <div class="oldprice">105.000</div>
          <div class="pro_price">63.000</div>
          <div style="clear: both"></div>

          <hr color="#6da6b1" />

          <div class="pro_title">Goth - Những Kẻ Hắc Ám (Tái Bản 2019)</div>
          <div style="text-align: center"><img src="images/Sach_3.jpg" height="120" /></div>
          <div class="oldprice">108.000</div>
          <div class="pro_price">86.400</div>
          <div style="clear: both"></div>
        </marquee>
      </div>
    </div>
  </body>
</html>
