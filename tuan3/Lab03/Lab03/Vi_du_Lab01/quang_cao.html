<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Widget Quảng cáo</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Rubik", sans-serif;
      }
      /* CSS gốc cho phần Tiêu đề và Khung */
      .title {
        line-height: 30px;
        text-align: center;
        color: #fff;
        font-weight: bold;
        background-color: #504b4b;
        border-radius: 10px 10px 0 0;
        width: 200px; /* Độ rộng khớp với sidebar */
      }
      .box_content {
        text-align: center;
        border: 3px solid #504b4b;
        padding: 2px;
        width: 193px;
        background-color: #fff;
      }
      .box_content img {
        display: block;
        margin: 0 auto;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <div class="title">Quảng cáo</div>
      <div class="box_content">
        <img src="images/Sach_7.jpg" width="100%" alt="Quảng cáo sách" />
      </div>
    </div>
  </body>
</html>
